<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Logs · GYAN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/vms.css">
  <link rel="stylesheet" href="/static/css/pages.css">
  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('gyan-theme') || 'dark');</script>
</head>
<body>
<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-header"><div class="brand-icon"></div><span class="brand-name">GYAN</span></div>
    <nav class="sidebar-menu">
      <div class="menu-group">
        <div class="menu-group-title">Compute</div>
        <div class="menu-items">
          <a href="/dashboard" class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg><span>Virtual machines</span></a>
          <a href="/schedules" class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Schedules</span></a>
        </div>
      </div>
      <div class="menu-group">
        <div class="menu-group-title">Admin</div>
        <div class="menu-items">
          <a href="/users" class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Users</span></a>
          <a href="/audit" class="menu-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg><span>Audit logs</span></a>
          <a href="/settings" class="menu-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06.06A1.65 1.65 0 0 0 4.6 9z"/></svg><span>Settings</span></a>
        </div>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-profile"><div class="user-avatar" id="userAvatar">U</div><div class="user-info"><span class="user-name" id="userName">User</span><span class="user-role" id="userRole">Administrator</span></div></div>
      <button class="btn-signout" id="btnSignout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span>Sign out</span></button>
        <button class="theme-toggle" id="btnThemeToggle">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <span class="theme-label">Light mode</span>
        </button>
    </div>
  </aside>

  <main class="main-content">
    <header class="header">
      <div class="header-left">
        <h1 class="header-title">Audit logs</h1>
        <p class="header-subtitle" id="headerSubtitle">All VM control actions, newest first</p>
      </div>
      <div class="header-right">
        <div class="search-wrapper" style="width:200px;">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="search-input" id="searchInput" placeholder="Filter by VM or user…">
        </div>
        <button class="btn-ghost" id="btnRefresh">
          <svg class="icon-sync" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          Refresh
        </button>
      </div>
    </header>

    <div class="scroll-container">
      <section class="table-card">
        <table class="data-table" id="auditTable">
          <thead><tr>
            <th>Timestamp</th>
            <th>Operator</th>
            <th>VM</th>
            <th>Action</th>
            <th>Result</th>
          </tr></thead>
          <tbody id="auditTableBody">
            <tr class="skeleton-row"><td><div class="skeleton-text size"></div></td><td><div class="skeleton-text status"></div></td><td><div class="skeleton-text name"></div></td><td><div class="skeleton-text status"></div></td><td><div class="skeleton-text status"></div></td></tr>
            <tr class="skeleton-row"><td><div class="skeleton-text size"></div></td><td><div class="skeleton-text status"></div></td><td><div class="skeleton-text name"></div></td><td><div class="skeleton-text status"></div></td><td><div class="skeleton-text status"></div></td></tr>
            <tr class="skeleton-row"><td><div class="skeleton-text size"></div></td><td><div class="skeleton-text status"></div></td><td><div class="skeleton-text name"></div></td><td><div class="skeleton-text status"></div></td><td><div class="skeleton-text status"></div></td></tr>
          </tbody>
        </table>
        <div class="empty-state" id="emptyState">
          <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <h3 class="empty-title">No audit entries yet</h3>
          <p class="empty-desc">Actions performed on VMs will be logged here.</p>
        </div>
      </section>
    </div>
  </main>
</div>

<div class="toast-container" id="toastContainer" aria-live="assertive"></div>
<script src="/static/js/audit.js"></script>
<script src="/static/js/theme.js"></script>
</body>
</html>
