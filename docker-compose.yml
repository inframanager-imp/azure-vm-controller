version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gyan_azure_backend
    ports:
      - "2343:8000" # Expose the unified app on host port 2343
    volumes:
      - gyan_db_data:/app/db
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - FERNET_KEY=${FERNET_KEY}
      - DATABASE_URL=sqlite:///./db/gyan_azure.db
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@gyan.ai}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-GyanAdminPassword123!}
    restart: always

volumes:
  gyan_db_data:
    driver: local
