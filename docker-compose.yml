version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gyan_azure_backend
    volumes:
      - gyan_db_data:/app/db
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - FERNET_KEY=${FERNET_KEY}
      - DATABASE_URL=sqlite:///./db/gyan_azure.db
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@gyan.ai}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-GyanAdminPassword123!}
    restart: always
    # Port 8000 is internal to the docker network.
    # Frontend/Nginx proxies requests to it, so we don't expose it to the host.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gyan_azure_frontend
    ports:
      - "2343:80" # Exposed on port 2343 on the host as requested
    depends_on:
      - backend
    restart: always

volumes:
  gyan_db_data:
    driver: local
